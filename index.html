<!DOCTYPE html>
<html lang="el">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>GRowingArTs Karaoke 🎤</title>
    <style>
        /* CSS ΡΥΘΜΙΣΕΙΣ ΓΙΑ ΤΑ ΘΕΜΑΤΑ */
        :root {
            --bg-color: #0c0c24;
            --container-bg: #1e293b;
            --input-bg: #334155;
            --border-color: #475569;
            --accent-color: #00b4d8;
            --accent-hover: #0096b4;
            --text-main: #f8fafc;
            --text-muted: #b4b4d2;
            --timeline-bg: #1e293b;
        }

        /* Cyberpunk Theme */
        [data-theme="cyberpunk"] {
            --bg-color: #000000;
            --container-bg: #111111;
            --input-bg: #222222;
            --border-color: #ff0055;
            --accent-color: #ff0055;
            --accent-hover: #cc0044;
            --text-main: #00ffcc;
            --text-muted: #ff0055;
            --timeline-bg: #222222;
        }

        /* GRowingArTs Gold Theme */
        [data-theme="gold"] {
            --bg-color: #1a1a1a;
            --container-bg: #262626;
            --input-bg: #333333;
            --border-color: #d4af37;
            --accent-color: #d4af37;
            --accent-hover: #aa8c2c;
            --text-main: #ffffff;
            --text-muted: #e6e6e6;
            --timeline-bg: #333333;
        }

        body {
            margin: 0;
            background-color: var(--bg-color);
            color: var(--text-main);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 10px;
            box-sizing: border-box;
            transition: all 0.3s ease;
        }
        
        #setup-container {
            text-align: center;
            background: var(--container-bg);
            padding: 30px;
            border-radius: 16px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.6);
            max-width: 650px;
            width: 100%;
            box-sizing: border-box;
            z-index: 10;
        }
        
        h2 { color: var(--text-muted); margin-bottom: 25px; font-size: 26px; }
        
        .grid-inputs {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-bottom: 20px;
        }
        @media (max-width: 600px) {
            .grid-inputs { grid-template-columns: 1fr; gap: 15px; }
            #setup-container { padding: 20px; }
            h2 { font-size: 22px; }
        }

        .file-input {
            display: flex;
            flex-direction: column;
            text-align: left;
        }
        label { margin-bottom: 8px; color: var(--accent-color); font-size: 15px; font-weight: bold; }
        
        input[type="file"], textarea, select {
            background: var(--input-bg);
            padding: 12px;
            border-radius: 8px;
            border: 2px solid var(--border-color);
            color: white;
            font-family: inherit;
            box-sizing: border-box;
            font-size: 14px;
        }
        input[type="file"]:focus, textarea:focus, select:focus {
            border-color: var(--accent-color);
            outline: none;
        }
        
        textarea { width: 100%; height: 100px; resize: none; }
        
        /* Dropdown για τα Themes */
        .theme-select-container {
            margin-bottom: 20px;
            text-align: left;
            display: flex;
            flex-direction: column;
        }

        .switch-container {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            margin: 20px 0;
            background: rgba(0,0,0,0.2);
            padding: 12px;
            border-radius: 8px;
        }
        .switch {
            position: relative;
            display: inline-block;
            width: 50px;
            height: 26px;
        }
        .switch input { opacity: 0; width: 0; height: 0; }
        .slider {
            position: absolute;
            cursor: pointer;
            top: 0; left: 0; right: 0; bottom: 0;
            background-color: #475569;
            transition: .4s;
            border-radius: 34px;
        }
        .slider:before {
            position: absolute;
            content: "";
            height: 18px; width: 18px;
            left: 4px; bottom: 4px;
            background-color: white;
            transition: .4s;
            border-radius: 50%;
        }
        input:checked + .slider { background-color: var(--accent-color); }
        input:checked + .slider:before { transform: translateX(24px); }
        .switch-label { font-size: 14px; font-weight: bold; color: #cbd5e1; }

        button {
            background: var(--accent-color);
            color: #0c0c24;
            border: none;
            padding: 15px 35px;
            font-size: 18px;
            font-weight: bold;
            border-radius: 10px;
            cursor: pointer;
            margin-top: 10px;
            transition: all 0.2s;
            width: 100%;
        }
        button:hover { background: var(--accent-hover); transform: translateY(-1px); }
        
        #history-container {
            margin-top: 25px;
            text-align: left;
            background: rgba(0,0,0,0.3);
            padding: 15px;
            border-radius: 10px;
            max-height: 120px;
            overflow-y: auto;
        }
        #history-container h3 { margin: 0 0 12px 0; font-size: 14px; color: #94a3b8; }
        .history-item {
            font-size: 13px;
            padding: 6px 0;
            border-bottom: 1px solid rgba(255,255,255,0.05);
            color: #cbd5e1;
        }

        #canvas-container {
            display: none;
            position: relative;
            width: 100%;
            max-width: 900px;
            margin: 0 auto;
        }
        canvas {
            background-color: var(--bg-color);
            border-radius: 12px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.7);
            width: 100% !important;
            height: auto !important;
            display: block;
        }
        
        #controls {
            position: absolute;
            bottom: 15px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            gap: 8px;
            z-index: 15;
            width: 95%;
            justify-content: center;
        }
        .btn-control {
            background: var(--container-bg);
            color: var(--text-main);
            padding: 14px 10px;
            border-radius: 10px;
            font-weight: bold;
            font-size: 12px;
            border: 2px solid var(--border-color);
            cursor: pointer;
            flex: 1;
            text-align: center;
            box-shadow: 0 4px 10px rgba(0,0,0,0.4);
        }
        .btn-control:hover { background: var(--input-bg); }
        .btn-nav { background: var(--accent-color); color: #000; border-color: var(--accent-color); }
        .btn-nav:hover { background: var(--accent-hover); }
    </style>
</head>
<body>

    <!-- ΟΘΟΝΗ ΦΟΡΤΩΣΗΣ ΑΡΧΕΙΩΝ -->
    <div id="setup-container">
        <h2>GRowingArTs Karaoke 🎤</h2>
        
        <!-- ΕΠΙΛΟΓΗ ΘΕΜΑΤΟΣ -->
        <div class="theme-select-container">
            <label for="themeSelect">🎨 Επιλογή Θέματος / Choose Theme</label>
            <select id="themeSelect">
                <option value="default">Neon Night (Κλασικό)</option>
                <option value="cyberpunk">Cyberpunk 2077 (Φούξια / Μαύρο)</option>
                <option value="gold">GRowingArTs Gold (Χρυσό / Ανθρακί)</option>
            </select>
        </div>

        <div class="file-input" style="margin-bottom: 20px;">
            <label>1. Μουσική / Music (MP3)</label>
            <input type="file" id="audioFile" accept="audio/mp3">
        </div>
        
        <div class="grid-inputs">
            <div class="file-input">
                <label>2α. Αρχείο Στίχων / Lyrics File (.lrc/.txt)</label>
                <input type="file" id="lyricsFile" accept=".txt,.lrc">
            </div>
            <div class="file-input">
                <label>2β. Ή Επικόλληση Στίχων / Or Paste Lyrics</label>
                <textarea id="lyricsPaste" placeholder="Επικολλήστε τους στίχους εδώ..."></textarea>
            </div>
        </div>

        <div class="switch-container">
            <span class="switch-label">Φώτα Πάρτι / Party Lights:</span>
            <label class="switch">
                <input type="checkbox" id="partyLightsToggle" checked>
                <span class="slider"></span>
            </label>
        </div>
        
        <button id="startBtn">ΕΝΑΡΞΗ / START 🚀</button>

        <div id="history-container">
            <h3>Πρόσφατα Τραγούδια / Recent History</h3>
            <div id="history-list"></div>
        </div>
    </div>

    <!-- ΟΘΟΝΗ ΕΦΑΡΜΟΓΗΣ (CANVAS) -->
    <div id="canvas-container">
        <canvas id="karaokeCanvas" width="1024" height="768"></canvas>
        <div id="controls">
            <button class="btn-control btn-nav" id="prevLyricsBtn" style="display:none;">⬅️ ΠΙΣΩ</button>
            <button class="btn-control" id="rewindBtn">↩️ 10s</button> <!-- ΚΟΥΜΠΙ REWIND -->
            <button class="btn-control" id="pauseBtn">PAUSE</button>
            <button class="btn-control" id="restartBtn">RESET</button>
            <button class="btn-control btn-nav" id="nextLyricsBtn" style="display:none;">ΕΠΟΜΕΝΟ ➡️</button>
        </div>
    </div>

    <script>
        let audioCtx, audioSrc, analyser, dataArray, bufferLength;
        let audio, lyrics = [], songTitle = "KARAOKE PRO";
        let hasTimestamps = true;
        let partyLightsEnabled = true;
        let currentPlainBlockIndex = 0; 
        let currentTheme = 'default';

        const canvas = document.getElementById('karaokeCanvas');
        const ctx = canvas.getContext('2d');
        let previousHeights = new Array(36).fill(5);

        let ballX = 512, ballY = 320, ballTargetX = 512, ballTargetY = 320;

        window.addEventListener('DOMContentLoaded', displayHistory);

        // Αλλαγή Θέματος από το Dropdown
        const themeSelect = document.getElementById('themeSelect');
        themeSelect.addEventListener('change', (e) => {
            currentTheme = e.target.value;
            if (currentTheme === 'default') {
                document.documentElement.removeAttribute('data-theme');
            } else {
                document.documentElement.setAttribute('data-theme', currentTheme);
            }
        });

        document.getElementById('startBtn').addEventListener('click', async () => {
            const audioInput = document.getElementById('audioFile').files[0];
            const lyricsInput = document.getElementById('lyricsFile').files[0];
            const lyricsPastedText = document.getElementById('lyricsPaste').value.trim();
            partyLightsEnabled = document.getElementById('partyLightsToggle').checked;

            if (!audioInput) {
                alert("Παρακαλώ επιλέξτε αρχείο μουσικής!");
                return;
            }
            if (!lyricsInput && !lyricsPastedText) {
                alert("Παρακαλώ ανεβάστε αρχείο ή επικολλήστε στίχους!");
                return;
            }

            songTitle = audioInput.name.replace(/\.[^/.]+$/, "").toUpperCase();
            saveToHistory(songTitle);

            audio = new Audio(URL.createObjectURL(audioInput));

            if (lyricsPastedText) {
                hasTimestamps = false;
                parsePlainLyricsIntoBlocks(lyricsPastedText);
                showNavigationButtons();
            } else {
                const lyricsText = await lyricsInput.text();
                if (lyricsText.includes('[') && lyricsText.includes(']')) {
                    hasTimestamps = true;
                    parseEnhancedLyrics(lyricsText);
                } else {
                    hasTimestamps = false;
                    parsePlainLyricsIntoBlocks(lyricsText);
                    showNavigationButtons();
                }
            }

            setupRealVisualizer();

            document.getElementById('setup-container').style.display = 'none';
            document.getElementById('canvas-container').style.display = 'block';

            canvas.addEventListener('click', handleProgressBarClick);

            audio.play();
            requestAnimationFrame(updateFrame);
        });

        function setupRealVisualizer() {
            audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            audioSrc = audioCtx.createMediaElementSource(audio);
            analyser = audioCtx.createAnalyser();
            audioSrc.connect(analyser);
            analyser.connect(audioCtx.destination);
            analyser.fftSize = 128;
            bufferLength = analyser.frequencyBinCount;
            dataArray = new Uint8Array(bufferLength);
        }

        function parseTime(timeStr) {
            const parts = timeStr.split(':');
            return parseInt(parts[0]) * 60 + parseFloat(parts[1]);
        }

        function parsePlainLyricsIntoBlocks(text) {
            const lines = text.split('\n').map(l => l.trim()).filter(l => l.length > 0);
            lyrics = []; 
            currentPlainBlockIndex = 0;
            const linesPerBlock = 7; 
            for (let i = 0; i < lines.length; i += linesPerBlock) {
                let blockLines = lines.slice(i, i + linesPerBlock);
                lyrics.push(blockLines);
            }
        }

        function showNavigationButtons() {
            const prevBtn = document.getElementById('prevLyricsBtn');
            const nextBtn = document.getElementById('nextLyricsBtn');
            prevBtn.style.display = 'block';
            nextBtn.style.display = 'block';
            prevBtn.onclick = () => { if (currentPlainBlockIndex > 0) currentPlainBlockIndex--; };
            nextBtn.onclick = () => { if (currentPlainBlockIndex < lyrics.length - 1) currentPlainBlockIndex++; };
        }

        function parseEnhancedLyrics(text) {
            const lines = text.split('\n');
            let tempLines = [];
            lines.forEach(line => {
                line = line.trim();
                if (!line) return;
                const lineMatch = line.match(/^\[(\d+:\d+\.\d+)\](.*)/);
                if (!lineMatch) return;
                const startTime = parseTime(lineMatch[1]);
                const content = lineMatch[2].trim();
                let wordsData = [];
                let fullText = "";
                const wordRegex = /<(\d+:\d+\.\d+)>\s*([^<]+)/g;
                const firstWordMatch = content.match(/^([^<]+)/);
                if (firstWordMatch && firstWordMatch[1].trim()) {
                    wordsData.push({ time: startTime, text: firstWordMatch[1] });
                    fullText += firstWordMatch[1];
                }
                let match;
                while ((match = wordRegex.exec(content)) !== null) {
                    wordsData.push({ time: parseTime(match[1]), text: match[2] });
                    fullText += match[2];
                }
                if (wordsData.length === 0) {
                    fullText = content.replace(/<\d+:\d+\.\d+>/g, '').trim();
                    wordsData.push({ time: startTime, text: fullText });
                }
                tempLines.push({ start_time: startTime, full_text: fullText, words: wordsData });
            });
            tempLines.sort((a, b) => a.start_time - b.start_time);
            for (let i = 0; i < tempLines.length; i++) {
                if (i + 1 < tempLines.length) {
                    tempLines[i].end_time = tempLines[i+1].start_time;
                } else {
                    tempLines[i].end_time = tempLines[i].start_time + 8.0;
                }
            }
            lyrics = tempLines;
        }

        function handleProgressBarClick(e) {
            const rect = canvas.getBoundingClientRect();
            const scaleX = canvas.width / rect.width;
            const scaleY = canvas.height / rect.height;

            const clickX = (e.clientX - rect.left) * scaleX;
            const clickY = (e.clientY - rect.top) * scaleY;
            
            const barY = canvas.height - 25;
            const barHeight = 12;
            const startX = 60;
            const endX = canvas.width - 60;

            if (clickY >= barY - 20 && clickY <= barY + barHeight + 20 && clickX >= startX && clickX <= endX) {
                const percentage = (clickX - startX) / (endX - startX);
                if (audio && audio.duration) {
                    audio.currentTime = percentage * audio.duration;
                }
            }
        }

        const pauseBtn = document.getElementById('pauseBtn');
        pauseBtn.addEventListener('click', () => {
            if (audioCtx && audioCtx.state === 'suspended') audioCtx.resume();
            if (audio.paused) {
                audio.play();
                pauseBtn.innerText = "PAUSE";
            } else {
                audio.pause();
                pauseBtn.innerText = "PLAY";
            }
        });

        document.getElementById('restartBtn').addEventListener('click', () => {
            audio.currentTime = 0;
            audio.play();
            if(!hasTimestamps) currentPlainBlockIndex = 0;
            pauseBtn.innerText = "PAUSE";
        });

        // ↩️ ΛΕΙΤΟΥΡΓΙΑ REWIND 10s
        document.getElementById('rewindBtn').addEventListener('click', () => {
            if (audio) {
                audio.currentTime = Math.max(0, audio.currentTime - 10);
            }
        });

        function updateFrame() {
            const currentTime = audio.currentTime;
            const duration = audio.duration || 1;
            
            if (analyser && !audio.paused) {
                analyser.getByteFrequencyData(dataArray);
            }

            let bassIntensity = 0;
            if (analyser && !audio.paused) {
                bassIntensity = (dataArray[0] + dataArray[1] + dataArray[2] + dataArray[3]) / 4;
            }

            // Χρώματα ανάλογα με το Θέμα
            let canvasBg = '#0c0c24';
            let titleColor = '#b4b4d2';
            let lyricDefaultColor = '#6e6e7d';
            let lyricActiveColor = '#ffeb00';
            let nextLyricColor = '#82b4e6';
            let ballColor = '#ff3366';
            let visualizerHueStart = 180;

            if (currentTheme === 'cyberpunk') {
                canvasBg = '#000000'; titleColor = '#00ffcc'; lyricDefaultColor = '#333333';
                lyricActiveColor = '#00ffcc'; nextLyricColor = '#ff0055'; ballColor = '#ffff00';
                visualizerHueStart = 320;
            } else if (currentTheme === 'gold') {
                canvasBg = '#1a1a1a'; titleColor = '#ffffff'; lyricDefaultColor = '#555555';
                lyricActiveColor = '#d4af37'; nextLyricColor = '#aaaaaa'; ballColor = '#ffffff';
                visualizerHueStart = 45;
            }

            if (partyLightsEnabled && bassIntensity > 80 && !audio.paused) {
                let hue = (currentTime * 20) % 360;
                let opacity = (bassIntensity / 255) * 0.3;
                document.body.style.backgroundColor = `hsla(${hue}, 70%, 15%, ${opacity})`;
                ctx.fillStyle = `hsla(${hue}, 60%, 8%, 0.85)`;
            } else {
                document.body.style.backgroundColor = 'var(--bg-color)';
                ctx.fillStyle = canvasBg;
            }
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            ctx.fillStyle = titleColor;
            ctx.font = 'bold 28px Arial';
            ctx.textAlign = 'center';
            ctx.fillText("GRowingArTs Karaoke", canvas.width / 2, 50);

            ctx.strokeStyle = currentTheme === 'cyberpunk' ? '#ff0055' : (currentTheme === 'gold' ? '#d4af37' : '#1e1e46');
            ctx.lineWidth = 1;
            ctx.beginPath(); ctx.moveTo(100, 75); ctx.lineTo(canvas.width - 100, 75); ctx.stroke();

            // 📊 VISUALIZER
            const numBars = 36;
            const barWidth = 14;
            const gap = 6;
            const startX = (canvas.width - (numBars * (barWidth + gap) - gap)) / 2;
            const baseY = canvas.height - 160;

            for (let i = 0; i < numBars; i++) {
                let targetHeight = 5;
                if (analyser && !audio.paused && currentTime > 0) {
                    let dataIndex = Math.floor(i * 1.4);
                    let value = dataArray[dataIndex] || 0;
                    targetHeight = (value / 255) * 140 + 5;
                }
                if (targetHeight > previousHeights[i]) {
                    previousHeights[i] += (targetHeight - previousHeights[i]) * 0.25;
                } else {
                    previousHeights[i] += (targetHeight - previousHeights[i]) * 0.15;
                }
                ctx.fillStyle = `hsl(${visualizerHueStart + previousHeights[i] * 0.4}, 90%, 50%)`;
                ctx.beginPath();
                ctx.roundRect(startX + i * (barWidth + gap), baseY - previousHeights[i], barWidth, previousHeights[i], 3);
                ctx.fill();
            }

            // --- ΣΤΙΧΟΙ ---
            if (hasTimestamps) {
                let currentLine = null;
                let nextLineText = "";
                const firstLyricTime = lyrics.length > 0 ? lyrics[0].start_time : 0;

                for (let i = 0; i < lyrics.length; i++) {
                    if (currentTime >= lyrics[i].start_time && currentTime < lyrics[i].end_time) {
                        currentLine = lyrics[i];
                        if (i + 1 < lyrics.length) nextLineText = lyrics[i+1].full_text;
                        break;
                    }
                }

                if (currentLine) {
                    let totalYellowChars = 0;
                    let activeWordIndex = 0;
                    
                    currentLine.words.forEach((w, idx) => {
                        let nextTime = (idx + 1 < currentLine.words.length) ? currentLine.words[idx+1].time : currentLine.end_time;
                        let duration = nextTime - w.time;
                        if (currentTime >= w.time) {
                            activeWordIndex = idx;
                            if (currentTime < nextTime) {
                                let elapsed = currentTime - w.time;
                                let progress = Math.min(elapsed / (duration * 0.4), 1.0);
                                totalYellowChars += Math.floor(w.text.length * progress);
                            } else {
                                totalYellowChars += w.text.length;
                            }
                        }
                    });

                    ctx.font = 'bold 46px Trebuchet MS';
                    let textY = canvas.height / 2 - 20;

                    ctx.fillStyle = lyricDefaultColor;
                    ctx.fillText(currentLine.full_text, canvas.width / 2, textY);

                    let fullWidth = ctx.measureText(currentLine.full_text).width;
                    let startXText = (canvas.width - fullWidth) / 2;

                    if (totalYellowChars > 0) {
                        let yellowText = currentLine.full_text.substring(0, totalYellowChars);
                        ctx.fillStyle = lyricActiveColor;
                        ctx.textAlign = 'left';
                        ctx.fillText(yellowText, startXText, textY);
                        ctx.textAlign = 'center';
                    }

                    let textBeforeActive = "";
                    for(let i=0; i <= activeWordIndex; i++) { textBeforeActive += currentLine.words[i].text; }
                    let currentWordText = currentLine.words[activeWordIndex].text;
                    let widthOfTextBefore = ctx.measureText(textBeforeActive).width;
                    let widthOfCurrentWord = ctx.measureText(currentWordText).width;
                    
                    ballTargetX = startXText + widthOfTextBefore - (widthOfCurrentWord / 2);
                    let pulse = Math.abs(Math.sin(currentTime * Math.PI * 2)) * 25; 
                    ballTargetY = textY - 45 - pulse;

                    ballX += (ballTargetX - ballX) * 0.15; ballY += (ballTargetY - ballY) * 0.15;

                    ctx.fillStyle = ballColor; ctx.beginPath(); ctx.arc(ballX, ballY, 12, 0, Math.PI * 2); ctx.fill();
                    ctx.fillStyle = '#ffffff'; ctx.beginPath(); ctx.arc(ballX - 3, ballY - 3, 4, 0, Math.PI * 2); ctx.fill();

                    if (nextLineText) {
                        if (nextLineText.length > 50) nextLineText = nextLineText.substring(0, 47) + "...";
                        ctx.fillStyle = nextLyricColor;
                        ctx.font = 'italic 24px Arial';
                        ctx.fillText("Next: " + nextLineText, canvas.width / 2, canvas.height - 290);
                    }
                } else if (currentTime < (firstLyricTime - 3.0)) {
                    ctx.fillStyle = nextLyricColor;
                    ctx.font = 'italic 32px Arial';
                    ctx.fillText("♪ Instrumental Intro ♪", canvas.width / 2, canvas.height / 2 - 20);
                }
            } else {
                if (lyrics.length > 0) {
                    let currentBlock = lyrics[currentPlainBlockIndex];
                    ctx.font = '32px Arial';
                    ctx.fillStyle = '#ffffff';
                    ctx.textAlign = 'center';
                    
                    let startY = 180; 
                    let lineSpacing = 48;
                    
                    currentBlock.forEach((lineText, index) => {
                        ctx.fillText(lineText, canvas.width / 2, startY + (index * lineSpacing));
                    });

                    ctx.font = 'bold 16px Arial';
                    ctx.fillStyle = '#64748b';
                    ctx.fillText(`Page: ${currentPlainBlockIndex + 1} / ${lyrics.length}`, canvas.width / 2, canvas.height - 240);
                }
            }

            // 🗺️ ΜΠΑΡΑ ΠΡΟΟΔΟΥ
            const barY = canvas.height - 25;
            const barHeight = 12;
            const timelineStartX = 60;
            const timelineEndX = canvas.width - 60;
            const timelineWidth = timelineEndX - timelineStartX;
            const progress = currentTime / duration;

            ctx.fillStyle = currentTheme === 'cyberpunk' ? '#222' : (currentTheme === 'gold' ? '#333' : '#1e293b');
            ctx.beginPath(); ctx.roundRect(timelineStartX, barY, timelineWidth, barHeight, 6); ctx.fill();

            ctx.fillStyle = currentTheme === 'cyberpunk' ? '#ff0055' : (currentTheme === 'gold' ? '#d4af37' : '#00b4d8');
            ctx.beginPath(); ctx.roundRect(timelineStartX, barY, timelineWidth * progress, barHeight, 6); ctx.fill();

            ctx.fillStyle = '#ffffff';
            ctx.beginPath(); ctx.arc(timelineStartX + (timelineWidth * progress), barY + (barHeight/2), 9, 0, Math.PI * 2); ctx.fill();

            ctx.fillStyle = '#94a3b8';
            ctx.font = '13px Arial';
            ctx.textAlign = 'left';
            ctx.fillText(formatTime(currentTime), timelineStartX, barY - 8);
            ctx.textAlign = 'right';
            ctx.fillText(formatTime(duration), timelineEndX, barY - 8);
            ctx.textAlign = 'center';

            requestAnimationFrame(updateFrame);
        }

        function formatTime(secs) {
            let m = Math.floor(secs / 60); let s = Math.floor(secs % 60);
            return (m < 10 ? "0" : "") + m + ":" + (s < 10 ? "0" : "") + s;
        }

        function saveToHistory(title) {
            let history = JSON.parse(localStorage.getItem('karaokeHistory')) || [];
            history = history.filter(item => item.title !== title);
            const timestamp = new Date().toLocaleTimeString('el-GR', { hour: '2-digit', minute: '2-digit' });
            history.unshift({ title: title, time: timestamp });
            if (history.length > 5) history.pop();
            localStorage.setItem('karaokeHistory', JSON.stringify(history));
            displayHistory();
        }

        function displayHistory() {
            const historyList = document.getElementById('history-list');
            const history = JSON.parse(localStorage.getItem('karaokeHistory')) || [];
            if (history.length === 0) {
                historyList.innerHTML = "<p style='color:#475569; font-size:13px; margin:0;'>No recent history.</p>";
                return;
            }
            historyList.innerHTML = history.map(item => `<div class="history-item">🎵 ${item.title}</div>`).join('');
        }
    </script>
</body>
