<!DOCTYPE html>
<html lang="el">
<head>
    <meta charset="UTF-8">
    <title> GrowingArts' Karaoke 🎤</title>
    <style>
        body {
            margin: 0;
            background-color: #0c0c24;
            color: #f8fafc;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            overflow: hidden;
        }
        
        /* 📐 ΔΙΕΥΡΥΜΕΝΟ UI (Μεγαλύτερο Παράθυρο) */
        #setup-container {
            text-align: center;
            background: #1e293b;
            padding: 40px;
            border-radius: 16px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.6);
            max-width: 650px; /* Αυξήθηκε από 450px */
            width: 95%;
            box-sizing: border-box;
        }
        
        h2 { color: #b4b4d2; margin-bottom: 25px; font-size: 28px; }
        
        .grid-inputs {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-bottom: 20px;
        }
        @media (max-width: 600px) {
            .grid-inputs { grid-template-columns: 1fr; }
        }

        .file-input {
            display: flex;
            flex-direction: column;
            text-align: left;
        }
        label { margin-bottom: 8px; color: #00b4d8; font-size: 15px; font-weight: bold; }
        
        input[type="file"], textarea {
            background: #334155;
            padding: 12px;
            border-radius: 8px;
            border: 2px solid #475569;
            color: white;
            font-family: inherit;
            box-sizing: border-box;
        }
        input[type="file"]:focus, textarea:focus {
            border-color: #00b4d8;
            outline: none;
        }
        
        textarea {
            width: 100%;
            height: 120px;
            resize: none;
        }
        
        /* Δίγλωσσα μεγάλα κουμπιά */
        button {
            background: #00b4d8;
            color: #0c0c24;
            border: none;
            padding: 15px 35px;
            font-size: 18px;
            font-weight: bold;
            border-radius: 10px;
            cursor: pointer;
            margin-top: 10px;
            transition: all 0.2s;
            width: 100%;
            letter-spacing: 0.5px;
        }
        button:hover { background: #0096b4; transform: translateY(-1px); }
        
        #history-container {
            margin-top: 25px;
            text-align: left;
            background: #0f172a;
            padding: 20px;
            border-radius: 10px;
            max-height: 180px;
            overflow-y: auto;
        }
        #history-container h3 { margin: 0 0 12px 0; font-size: 15px; color: #94a3b8; }
        .history-item {
            font-size: 14px;
            padding: 8px 0;
            border-bottom: 1px solid #1e293b;
            color: #cbd5e1;
            display: flex;
            justify-content: space-between;
        }
        .history-time { color: #64748b; font-size: 12px; }

        #canvas-container {
            display: none;
            position: relative;
        }
        canvas {
            background-color: #0c0c24;
            border-radius: 8px;
        }
        #controls {
            position: absolute;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            gap: 20px;
        }
        .btn-control {
            background: #1e293b;
            color: #f8fafc;
            padding: 12px 30px;
            border-radius: 8px;
            font-weight: bold;
            font-size: 15px;
            width: auto;
        }
        .btn-control:hover { background: #334155; }
    </style>
</head>
<body>

    <div id="setup-container">
        <h2>Karaoke Pro System 🎤</h2>
        
        <div class="file-input" style="margin-bottom: 20px;">
            <label>1. Μουσική / Music (MP3)</label>
            <input type="file" id="audioFile" accept="audio/mp3">
        </div>
        
        <div class="grid-inputs">
            <div class="file-input">
                <label>2α. Αρχείο Στίχων / Lyrics File (.lrc/.txt)</label>
                <input type="file" id="lyricsFile" accept=".txt,.lrc">
            </div>
            <div class="file-input">
                <label>2β. Ή Επικόλληση Στίχων / Or Paste Lyrics</label>
                <textarea id="lyricsPaste" placeholder="Επικολλήστε τους στίχους εδώ (έναν σε κάθε γραμμή)...&#10;Paste lyrics here (one per line)..."></textarea>
            </div>
        </div>
        
        <button id="startBtn">ΕΝΑΡΞΗ / START 🚀</button>

        <div id="history-container">
            <h3>Πρόσφατα Τραγούδια / Recent History</h3>
            <div id="history-list"></div>
        </div>
    </div>

    <div id="canvas-container">
        <canvas id="karaokeCanvas" width="1024" height="768"></canvas>
        <div id="controls">
            <button class="btn-control" id="pauseBtn">ΠΑΥΣΗ / PAUSE</button>
            <button class="btn-control" id="restartBtn">ΕΠΑΝΕΚΚΙΝΗΣΗ / RESTART</button>
        </div>
    </div>

    <script>
        let audioCtx, audioSrc, analyser, dataArray, bufferLength;
        let audio, lyrics = [], songTitle = "KARAOKE PRO";
        let hasTimestamps = true; // Flag για το αν οι στίχοι έχουν χρόνο
        
        const canvas = document.getElementById('karaokeCanvas');
        const ctx = canvas.getContext('2d');
        let previousHeights = new Array(36).fill(5);

        window.addEventListener('DOMContentLoaded', displayHistory);

        document.getElementById('startBtn').addEventListener('click', async () => {
            const audioInput = document.getElementById('audioFile').files[0];
            const lyricsInput = document.getElementById('lyricsFile').files[0];
            const lyricsPastedText = document.getElementById('lyricsPaste').value.trim();

            if (!audioInput) {
                alert("Παρακαλώ επιλέξτε αρχείο μουσικής! / Please select an audio file!");
                return;
            }
            if (!lyricsInput && !lyricsPastedText) {
                alert("Παρακαλώ ανεβάστε αρχείο ή επικολλήστε στίχους! / Please upload a file or paste lyrics!");
                return;
            }

            songTitle = audioInput.name.replace(/\.[^/.]+$/, "").toUpperCase();
            saveToHistory(songTitle);

            // Δημιουργία Audio Element
            audio = new Audio(URL.createObjectURL(audioInput));

            // Επεξεργασία Στίχων (Αρχείο ή Textarea)
            if (lyricsPastedText) {
                // Επικόλληση απλών στίχων χωρίς χρόνο
                hasTimestamps = false;
                audio.addEventListener('loadedmetadata', () => {
                    parsePlainLyrics(lyricsPastedText, audio.duration);
                });
            } else {
                // Φόρτωση από αρχείο
                const lyricsText = await lyricsInput.text();
                // Έλεγχος αν το αρχείο περιέχει χρονισμούς [00:00.00]
                if (lyricsText.includes('[') && lyricsText.includes(']')) {
                    hasTimestamps = true;
                    parseEnhancedLyrics(lyricsText);
                } else {
                    hasTimestamps = false;
                    audio.addEventListener('loadedmetadata', () => {
                        parsePlainLyrics(lyricsText, audio.duration);
                    });
                }
            }

            setupRealVisualizer();

            document.getElementById('setup-container').style.display = 'none';
            document.getElementById('canvas-container').style.display = 'block';

            audio.play();
            requestAnimationFrame(updateFrame);
        });

        function setupRealVisualizer() {
            audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            audioSrc = audioCtx.createMediaElementSource(audio);
            analyser = audioCtx.createAnalyser();
            audioSrc.connect(analyser);
            analyser.connect(audioCtx.destination);
            analyser.fftSize = 128;
            bufferLength = analyser.frequencyBinCount;
            dataArray = new Uint8Array(bufferLength);
        }

        function parseTime(timeStr) {
            const parts = timeStr.split(':');
            return parseInt(parts[0]) * 60 + parseFloat(parts[1]);
        }

        // 1. ΕΠΕΞΕΡΓΑΣΙΑ ΑΠΛΩΝ ΣΤΙΧΩΝ (Auto-Timing)
        function parsePlainLyrics(text, duration) {
            const lines = text.split('\n').map(l => l.trim()).filter(l => l.length > 0);
            if (lines.length === 0) return;

            const timePerLine = duration / lines.length;
            let tempLines = [];

            lines.forEach((lineText, idx) => {
                let startTime = idx * timePerLine;
                let endTime = (idx + 1) * timePerLine;
                
                // Δημιουργούμε ένα ψεύτικο word array ώστε να μην κρασάρει ο κώδικας του highlighting
                let wordsData = [{ time: startTime, text: lineText }];
                
                tempLines.push({
                    start_time: startTime,
                    end_time: endTime,
                    full_text: lineText,
                    words: wordsData
                });
            });
            lyrics = tempLines;
        }

        // 2. ΕΠΕΞΕΡΓΑΣΙΑ ENHANCED LRC
        function parseEnhancedLyrics(text) {
            const lines = text.split('\n');
            let tempLines = [];

            lines.forEach(line => {
                line = line.trim();
                if (!line) return;
                const lineMatch = line.match(/^\[(\d+:\d+\.\d+)\](.*)/);
                if (!lineMatch) return;

                const startTime = parseTime(lineMatch[1]);
                const content = lineMatch[2].trim();

                let wordsData = [];
                let fullText = "";

                const wordRegex = /<(\d+:\d+\.\d+)>\s*([^<]+)/g;
                const firstWordMatch = content.match(/^([^<]+)/);

                if (firstWordMatch && firstWordMatch[1].trim()) {
                    wordsData.push({ time: startTime, text: firstWordMatch[1] });
                    fullText += firstWordMatch[1];
                }

                let match;
                while ((match = wordRegex.exec(content)) !== null) {
                    wordsData.push({ time: parseTime(match[1]), text: match[2] });
                    fullText += match[2];
                }

                if (wordsData.length === 0) {
                    fullText = content.replace(/<\d+:\d+\.\d+>/g, '').trim();
                    wordsData.push({ time: startTime, text: fullText });
                }

                tempLines.push({ start_time: startTime, full_text: fullText, words: wordsData });
            });

            tempLines.sort((a, b) => a.start_time - b.start_time);
            
            for (let i = 0; i < tempLines.length; i++) {
                if (i + 1 < tempLines.length) {
                    tempLines[i].end_time = tempLines[i+1].start_time;
                } else {
                    tempLines[i].end_time = tempLines[i].start_time + 8.0;
                }
            }
            lyrics = tempLines;
        }

        // Κουμπιά ελέγχου
        const pauseBtn = document.getElementById('pauseBtn');
        pauseBtn.addEventListener('click', () => {
            if (audioCtx && audioCtx.state === 'suspended') audioCtx.resume();
            if (audio.paused) {
                audio.play();
                pauseBtn.innerText = "ΠΑΥΣΗ / PAUSE";
            } else {
                audio.pause();
                pauseBtn.innerText = "ΠΑΙΞΕ / PLAY";
            }
        });

        document.getElementById('restartBtn').addEventListener('click', () => {
            audio.currentTime = 0;
            audio.play();
            pauseBtn.innerText = "ΠΑΥΣΗ / PAUSE";
        });

        // 🔄 ΚΥΡΙΟΣ ΒΡΟΧΟΣ ΣΧΕΔΙΑΣΗΣ
        function updateFrame() {
            const currentTime = audio.currentTime;
            
            ctx.fillStyle = '#0c0c24';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            // Τίτλος
            ctx.fillStyle = '#b4b4d2';
            ctx.font = 'bold 28px Arial';
            ctx.textAlign = 'center';
            ctx.fillText(songTitle, canvas.width / 2, 50);

            ctx.strokeStyle = '#1e1e46';
            ctx.lineWidth = 2;
            ctx.beginPath();
            ctx.moveTo(100, 75);
            ctx.lineTo(canvas.width - 100, 75);
            ctx.stroke();

            // Εύρεση τρέχοντος στίχου
            let currentLine = null;
            let nextLineText = "";
            const firstLyricTime = lyrics.length > 0 ? lyrics[0].start_time : 0;

            for (let i = 0; i < lyrics.length; i++) {
                if (currentTime >= lyrics[i].start_time && currentTime < lyrics[i].end_time) {
                    currentLine = lyrics[i];
                    if (i + 1 < lyrics.length) nextLineText = lyrics[i+1].full_text;
                    break;
                }
            }

            // 📊 VISUALIZER
            if (analyser && !audio.paused) {
                analyser.getByteFrequencyData(dataArray);
            }

            const numBars = 36;
            const barWidth = 14;
            const gap = 6;
            const startX = (canvas.width - (numBars * (barWidth + gap) - gap)) / 2;
            const baseY = canvas.height - 160;

            for (let i = 0; i < numBars; i++) {
                let targetHeight = 5;
                if (analyser && !audio.paused && currentTime > 0) {
                    let dataIndex = Math.floor(i * 1.4);
                    let value = dataArray[dataIndex] || 0;
                    targetHeight = (value / 255) * 140 + 5;
                }

                if (targetHeight > previousHeights[i]) {
                    previousHeights[i] += (targetHeight - previousHeights[i]) * 0.25;
                } else {
                    previousHeights[i] += (targetHeight - previousHeights[i]) * 0.15;
                }

                ctx.fillStyle = `hsl(${180 + previousHeights[i] * 0.5}, 80%, 50%)`;
                ctx.beginPath();
                ctx.roundRect(startX + i * (barWidth + gap), baseY - previousHeights[i], barWidth, previousHeights[i], 3);
                ctx.fill();
            }

            // Αντίστροφη μέτρηση (Μόνο αν υπάρχουν timestamps)
            if (hasTimestamps) {
                const timeUntilFirst = firstLyricTime - currentTime;
                if (timeUntilFirst > 0 && timeUntilFirst <= 3.0 && !audio.paused) {
                    let countdownNum = Math.floor(timeUntilFirst) + 1;
                    ctx.fillStyle = '#ff4b4b';
                    ctx.font = 'bold 160px Trebuchet MS';
                    ctx.fillText(countdownNum, canvas.width / 2, canvas.height / 2 - 20);

                    ctx.fillStyle = '#ffffff';
                    ctx.font = 'italic 26px Arial';
                    ctx.fillText("GET READY...", canvas.width / 2, canvas.height / 2 + 90);
                }
            }

            // Εμφάνιση Στίχων
            if (currentLine) {
                let totalYellowChars = 0;
                
                if (hasTimestamps) {
                    currentLine.words.forEach((w, idx) => {
                        let nextTime = (idx + 1 < currentLine.words.length) ? currentLine.words[idx+1].time : currentLine.end_time;
                        let duration = nextTime - w.time;
                        if (currentTime >= w.time) {
                            if (currentTime < nextTime) {
                                let elapsed = currentTime - w.time;
                                let progress = Math.min(elapsed / (duration * 0.4), 1.0);
                                totalYellowChars += Math.floor(w.text.length * progress);
                            } else {
                                totalYellowChars += w.text.length;
                            }
                        }
                    });
                } else {
                    // Αν δεν έχει timestamps, γεμίζουμε το κίτρινο χρώμα γραμμικά με βάση τον χρόνο της γραμμής
                    let lineDuration = currentLine.end_time - currentLine.start_time;
                    let elapsed = currentTime - currentLine.start_time;
                    let progress = Math.min(elapsed / lineDuration, 1.0);
                    totalYellowChars = Math.floor(currentLine.full_text.length * progress);
                }

                ctx.font = 'bold 46px Trebuchet MS';
                let textY = canvas.height / 2 - 20;

                // Background γκρι
                ctx.fillStyle = '#6e6e7d';
                ctx.fillText(currentLine.full_text, canvas.width / 2, textY);

                // Highlight κίτρινο
                if (totalYellowChars > 0) {
                    let yellowText = currentLine.full_text.substring(0, totalYellowChars);
                    ctx.fillStyle = '#ffeb00';
                    ctx.textAlign = 'left';
                    
                    let fullWidth = ctx.measureText(currentLine.full_text).width;
                    let startXText = (canvas.width - fullWidth) / 2;
                    
                    ctx.fillText(yellowText, startXText, textY);
                    ctx.textAlign = 'center';
                }

                // 📐 ΎΨΩΣΗ ΤΟΥ NEXT (Επόμενος στίχος)
                // Ανέβηκε στο canvas.height - 290 (ήταν 260) για να μην "ακουμπάει" τις ψηλές μπάρες
                if (nextLineText) {
                    if (nextLineText.length > 50) nextLineText = nextLineText.substring(0, 47) + "...";
                    ctx.fillStyle = '#82b4e6';
                    ctx.font = 'italic 24px Arial';
                    ctx.fillText("Επόμενο / Next: " + nextLineText, canvas.width / 2, canvas.height - 290);
                }
            } else if (currentTime < (firstLyricTime - 3.0) && hasTimestamps) {
                ctx.fillStyle = '#82b4e6';
                ctx.font = 'italic 32px Arial';
                ctx.fillText("♪ Instrumental Intro ♪", canvas.width / 2, canvas.height / 2 - 20);
            }

            requestAnimationFrame(updateFrame);
        }

        function saveToHistory(title) {
            let history = JSON.parse(localStorage.getItem('karaokeHistory')) || [];
            history = history.filter(item => item.title !== title);
            const timestamp = new Date().toLocaleTimeString('el-GR', { hour: '2-digit', minute: '2-digit' });
            history.unshift({ title: title, time: timestamp });
            if (history.length > 5) history.pop();
            localStorage.setItem('karaokeHistory', JSON.stringify(history));
            displayHistory();
        }

        function displayHistory() {
            const historyList = document.getElementById('history-list');
            const history = JSON.parse(localStorage.getItem('karaokeHistory')) || [];
            if (history.length === 0) {
                historyList.innerHTML = "<p style='color:#475569; font-size:13px; margin:0;'>Δεν υπάρχουν πρόσφατα τραγούδια. / No recent history.</p>";
                return;
            }
            historyList.innerHTML = history.map(item => `
                <div class="history-item">
                    <span>🎵 ${item.title}</span>
                    <span class="history-time">${item.time}</span>
                </div>
            `).join('');
        }
    </script>
</body>
</html>
