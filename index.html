<!DOCTYPE html>
<html lang="el">
<head>
    <meta charset="UTF-8">
    <title>Global Karaoke Pro Web 🎤</title>
    <style>
        body {
            margin: 0;
            background-color: #0c0c24;
            color: #f8fafc;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            overflow: hidden;
        }
        #setup-container {
            text-align: center;
            background: #1e293b;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.5);
            max-width: 450px;
            width: 90%;
        }
        h2 { color: #b4b4d2; margin-bottom: 20px; }
        .file-input {
            margin: 15px 0;
            display: flex;
            flex-direction: column;
            text-align: left;
        }
        label { margin-bottom: 5px; color: #00b4d8; font-size: 14px; font-weight: bold; }
        input[type="file"] {
            background: #334155;
            padding: 10px;
            border-radius: 6px;
            border: none;
            color: white;
            cursor: pointer;
        }
        button {
            background: #00b4d8;
            color: #0c0c24;
            border: none;
            padding: 12px 30px;
            font-size: 16px;
            font-weight: bold;
            border-radius: 8px;
            cursor: pointer;
            margin-top: 15px;
            transition: background 0.2s;
            width: 100%;
        }
        button:hover { background: #0096b4; }
        
        /* Στυλ για το Ιστορικό */
        #history-container {
            margin-top: 20px;
            text-align: left;
            background: #0f172a;
            padding: 15px;
            border-radius: 8px;
            max-height: 150px;
            overflow-y: auto;
        }
        #history-container h3 { margin: 0 0 10px 0; font-size: 14px; color: #94a3b8; }
        .history-item {
            font-size: 13px;
            padding: 6px 0;
            border-bottom: 1px solid #1e293b;
            color: #cbd5e1;
            display: flex;
            justify-content: space-between;
        }
        .history-time { color: #64748b; font-size: 11px; }

        #canvas-container {
            display: none;
            position: relative;
        }
        canvas {
            background-color: #0c0c24;
            border-radius: 8px;
        }
        #controls {
            position: absolute;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            gap: 20px;
        }
        .btn-control {
            background: #1e293b;
            color: #f8fafc;
            padding: 10px 25px;
            border-radius: 6px;
            font-weight: bold;
            font-size: 14px;
            width: auto;
        }
        .btn-control:hover { background: #334155; }
    </style>
</head>
<body>

    <!-- ΟΘΟΝΗ ΦΟΡΤΩΣΗΣ ΑΡΧΕΙΩΝ -->
    <div id="setup-container">
        <h2>Karaoke Pro System 🎤</h2>
        <div class="file-input">
            <label>1. Επιλέξτε Αρχείο Μουσικής (MP3)</label>
            <input type="file" id="audioFile" accept="audio/mp3">
        </div>
        <div class="file-input">
            <label>2. Επιλέξτε Αρχείο Στίχων (.txt / .lrc)</label>
            <input type="file" id="lyricsFile" accept=".txt,.lrc">
        </div>
        <button id="startBtn">ΕΝΑΡΞΗ / START</button>

        <!-- UI ΓΙΑ ΤΟ LOCALSTORAGE ΙΣΤΟΡΙΚΟ -->
        <div id="history-container">
            <h3>Πρόσφατα Τραγούδια (History)</h3>
            <div id="history-list"></div>
        </div>
    </div>

    <!-- ΟΘΟΝΗ ΕΦΑΡΜΟΓΗΣ (CANVAS) -->
    <div id="canvas-container">
        <canvas id="karaokeCanvas" width="1024" height="768"></canvas>
        <div id="controls">
            <button class="btn-control" id="pauseBtn">ΠΑΥΣΗ</button>
            <button class="btn-control" id="restartBtn">ΕΠΑΝΕΚΚΙΝΗΣΗ</button>
        </div>
    </div>

    <script>
        // Μεταβλητές Ήχου & Web Audio API
        let audioCtx, audioSrc, analyser, dataArray, bufferLength;
        let audio, lyrics = [], songTitle = "KARAOKE PRO";
        
        const canvas = document.getElementById('karaokeCanvas');
        const ctx = canvas.getContext('2d');
        let previousHeights = new Array(36).fill(5);

        // Φόρτωση του ιστορικού μόλις ανοίξει η σελίδα
        window.addEventListener('DOMContentLoaded', displayHistory);

        document.getElementById('startBtn').addEventListener('click', async () => {
            const audioInput = document.getElementById('audioFile').files[0];
            const lyricsInput = document.getElementById('lyricsFile').files[0];

            if (!audioInput || !lyricsInput) {
                alert("Παρακαλώ επιλέξτε και τα δύο αρχεία!");
                return;
            }

            songTitle = audioInput.name.replace(/\.[^/.]+$/, "").toUpperCase();
            
            // 💾 LOCALSTORAGE: Αποθήκευση στο ιστορικό
            saveToHistory(songTitle);

            // Ανάγνωση στίχων
            const lyricsText = await lyricsInput.text();
            parseEnhancedLyrics(lyricsText);

            // Φόρτωση ήχου
            audio = new Audio(URL.createObjectURL(audioInput));
            
            // 🎛️ WEB AUDIO API ΣΕΤΑΡΙΣΜΑ (Πραγματικό Visualizer)
            setupRealVisualizer();

            // Εναλλαγή οθονών
            document.getElementById('setup-container').style.display = 'none';
            document.getElementById('canvas-container').style.display = 'block';

            audio.play();
            requestAnimationFrame(updateFrame);
        });

        function setupRealVisualizer() {
            // Δημιουργία του Audio Context (απαραίτητο για browsers)
            audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            
            // Σύνδεση του Audio Element με το Web Audio API
            audioSrc = audioCtx.createMediaElementSource(audio);
            analyser = audioCtx.createAnalyser();
            
            audioSrc.connect(analyser);
            analyser.connect(audioCtx.destination); // Σύνδεση με τα ηχεία
            
            // Ρυθμίσεις FFT (Fast Fourier Transform). Όσο μεγαλύτερο, τόσο πιο πολλές μπάρες.
            analyser.fftSize = 128; 
            bufferLength = analyser.frequencyBinCount; // 64 διαθέσιμες συχνότητες
            dataArray = new Uint8Array(bufferLength);
        }

        function parseTime(timeStr) {
            const parts = timeStr.split(':');
            return parseInt(parts[0]) * 60 + parseFloat(parts[1]);
        }

        function parseEnhancedLyrics(text) {
            const lines = text.split('\n');
            let tempLines = [];

            lines.forEach(line => {
                line = line.trim();
                if (!line) return;
                const lineMatch = line.match(/^\[(\d+:\d+\.\d+)\](.*)/);
                if (!lineMatch) return;

                const startTime = parseTime(lineMatch[1]);
                const content = lineMatch[2].trim();

                let wordsData = [];
                let fullText = "";

                const wordRegex = /<(\d+:\d+\.\d+)>\s*([^<]+)/g;
                const firstWordMatch = content.match(/^([^<]+)/);

                if (firstWordMatch && firstWordMatch[1].trim()) {
                    wordsData.push({ time: startTime, text: firstWordMatch[1] });
                    fullText += firstWordMatch[1];
                }

                let match;
                while ((match = wordRegex.exec(content)) !== null) {
                    wordsData.push({ time: parseTime(match[1]), text: match[2] });
                    fullText += match[2];
                }

                if (wordsData.length === 0) {
                    fullText = content.replace(/<\d+:\d+\.\d+>/g, '').trim();
                    wordsData.push({ time: startTime, text: fullText });
                }

                tempLines.push({ start_time: startTime, full_text: fullText, words: wordsData });
            });

            tempLines.sort((a, b) => a.start_time - b.start_time);
            
            for (let i = 0; i < tempLines.length; i++) {
                if (i + 1 < tempLines.length) {
                    tempLines[i].end_time = tempLines[i+1].start_time;
                } else {
                    tempLines[i].end_time = tempLines[i].start_time + 8.0;
                }
            }
            lyrics = tempLines;
        }

        // Κουμπιά ελέγχου
        const pauseBtn = document.getElementById('pauseBtn');
        pauseBtn.addEventListener('click', () => {
            // Στο iOS, το AudioContext πρέπει να γίνει resume αν παγώσει
            if (audioCtx && audioCtx.state === 'suspended') {
                audioCtx.resume();
            }
            if (audio.paused) {
                audio.play();
                pauseBtn.innerText = "ΠΑΥΣΗ";
            } else {
                audio.pause();
                pauseBtn.innerText = "ΠΑΙΞΕ";
            }
        });

        document.getElementById('restartBtn').addEventListener('click', () => {
            audio.currentTime = 0;
            audio.play();
            pauseBtn.innerText = "ΠΑΥΣΗ";
        });

        // 🔄 ΚΥΡΙΟΣ ΒΡΟΧΟΣ ΣΧΕΔΙΑΣΗΣ
        function updateFrame() {
            const currentTime = audio.currentTime;
            
            ctx.fillStyle = '#0c0c24';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            // Τίτλος
            ctx.fillStyle = '#b4b4d2';
            ctx.font = 'bold 28px Arial';
            ctx.textAlign = 'center';
            ctx.fillText(songTitle, canvas.width / 2, 50);

            ctx.strokeStyle = '#1e1e46';
            ctx.lineWidth = 2;
            ctx.beginPath();
            ctx.moveTo(100, 75);
            ctx.lineTo(canvas.width - 100, 75);
            ctx.stroke();

            // Εύρεση τρέχοντος στίχου
            let currentLine = null;
            let nextLineText = "";
            const firstLyricTime = lyrics.length > 0 ? lyrics[0].start_time : 0;

            for (let i = 0; i < lyrics.length; i++) {
                if (currentTime >= lyrics[i].start_time && currentTime < lyrics[i].end_time) {
                    currentLine = lyrics[i];
                    if (i + 1 < lyrics.length) nextLineText = lyrics[i+1].full_text;
                    break;
                }
            }

            // 📊 ΠΡΑΓΜΑΤΙΚΟ VISUALIZER (Διάβασμα συχνοτήτων)
            if (analyser && !audio.paused) {
                analyser.getByteFrequencyData(dataArray); // Γεμίζει το array με τιμές 0-255
            }

            const numBars = 36;
            const barWidth = 14;
            const gap = 6;
            const startX = (canvas.width - (numBars * (barWidth + gap) - gap)) / 2;
            const baseY = canvas.height - 160;

            for (let i = 0; i < numBars; i++) {
                let targetHeight = 5;
                
                // Αν παίζει η μουσική, πάρε την πραγματική τιμή της συχνότητας
                if (analyser && !audio.paused && currentTime > 0) {
                    // Διαλέγουμε συγκεκριμένες συχνότητες από το dataArray (π.χ. i * 1.5) 
                    // για να απλωθούν ωραία τα μπάσα και τα πρίμα στις 36 μπάρες μας.
                    let dataIndex = Math.floor(i * 1.4);
                    let value = dataArray[dataIndex] || 0;
                    
                    // Μετατροπή της τιμής (0-255) σε ύψος pixels (max 140px)
                    targetHeight = (value / 255) * 140 + 5;
                }

                // LERP για ομαλή κίνηση (smoothing)
                if (targetHeight > previousHeights[i]) {
                    previousHeights[i] += (targetHeight - previousHeights[i]) * 0.25;
                } else {
                    previousHeights[i] += (targetHeight - previousHeights[i]) * 0.15;
                }

                // Σχεδίαση μπάρας με εφέ gradient (χρώμα) ανάλογα με το ύψος
                ctx.fillStyle = `hsl(${180 + previousHeights[i] * 0.5}, 80%, 50%)`;
                ctx.beginPath();
                ctx.roundRect(startX + i * (barWidth + gap), baseY - previousHeights[i], barWidth, previousHeights[i], 3);
                ctx.fill();
            }

            // Αντίστροφη μέτρηση
            const timeUntilFirst = firstLyricTime - currentTime;
            if (timeUntilFirst > 0 && timeUntilFirst <= 3.0 && !audio.paused) {
                let countdownNum = Math.floor(timeUntilFirst) + 1;
                ctx.fillStyle = '#ff4b4b';
                ctx.font = 'bold 160px Trebuchet MS';
                ctx.fillText(countdownNum, canvas.width / 2, canvas.height / 2 - 20);

                ctx.fillStyle = '#ffffff';
                ctx.font = 'italic 26px Arial';
                ctx.fillText("GET READY...", canvas.width / 2, canvas.height / 2 + 90);
            }

            // Εμφάνιση Στίχων
            if (currentLine) {
                let totalYellowChars = 0;
                currentLine.words.forEach((w, idx) => {
                    let nextTime = (idx + 1 < currentLine.words.length) ? currentLine.words[idx+1].time : currentLine.end_time;
                    let duration = nextTime - w.time;
                    if (currentTime >= w.time) {
                        if (currentTime < nextTime) {
                            let elapsed = currentTime - w.time;
                            let progress = Math.min(elapsed / (duration * 0.4), 1.0);
                            totalYellowChars += Math.floor(w.text.length * progress);
                        } else {
                            totalYellowChars += w.text.length;
                        }
                    }
                });

                ctx.font = 'bold 46px Trebuchet MS';
                let textY = canvas.height / 2 - 20;

                // Background γκρι
                ctx.fillStyle = '#6e6e7d';
                ctx.fillText(currentLine.full_text, canvas.width / 2, textY);

                // Highlight κίτρινο
                if (totalYellowChars > 0) {
                    let yellowText = currentLine.full_text.substring(0, totalYellowChars);
                    ctx.fillStyle = '#ffeb00';
                    ctx.textAlign = 'left';
                    
                    let fullWidth = ctx.measureText(currentLine.full_text).width;
                    let startXText = (canvas.width - fullWidth) / 2;
                    
                    ctx.fillText(yellowText, startXText, textY);
                    ctx.textAlign = 'center';
                }

                // Επόμενος στίχος
                if (nextLineText) {
                    if (nextLineText.length > 50) nextLineText = nextLineText.substring(0, 47) + "...";
                    ctx.fillStyle = '#82b4e6';
                    ctx.font = 'italic 24px Arial';
                    ctx.fillText("Next: " + nextLineText, canvas.width / 2, canvas.height - 260);
                }
            } else if (currentTime < (firstLyricTime - 3.0)) {
                ctx.fillStyle = '#82b4e6';
                ctx.font = 'italic 32px Arial';
                ctx.fillText("♪ Instrumental Intro ♪", canvas.width / 2, canvas.height / 2 - 20);
            }

            requestAnimationFrame(updateFrame);
        }

        // 💾 ΣΥΝΑΡΤΗΣΕΙΣ LOCALSTORAGE
        function saveToHistory(title) {
            let history = JSON.parse(localStorage.getItem('karaokeHistory')) || [];
            
            // Φιλτράρισμα για να μην έχουμε διπλότυπα συνεχόμενα
            history = history.filter(item => item.title !== title);
            
            // Προσθήκη στην αρχή της λίστας με την τρέχουσα ημερομηνία
            const timestamp = new Date().toLocaleTimeString('el-GR', { hour: '2-digit', minute: '2-digit' });
            history.unshift({ title: title, time: timestamp });
            
            // Κρατάμε μόνο τα 5 τελευταία τραγούδια
            if (history.length > 5) history.pop();
            
            localStorage.setItem('karaokeHistory', JSON.stringify(history));
            displayHistory();
        }

        function displayHistory() {
            const historyList = document.getElementById('history-list');
            const history = JSON.parse(localStorage.getItem('karaokeHistory')) || [];
            
            if (history.length === 0) {
                historyList.innerHTML = "<p style='color:#475569; font-size:12px; margin:0;'>Δεν υπάρχουν πρόσφατα τραγούδια.</p>";
                return;
            }
            
            historyList.innerHTML = history.map(item => `
                <div class="history-item">
                    <span>🎵 ${item.title}</span>
                    <span class="history-time">${item.time}</span>
                </div>
            `).join('');
        }
    </script>
</body>
</html>
